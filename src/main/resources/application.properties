spring.application.name=minimal-api
logging.level.root=INFO
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.security.debug=true
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG

# JWT HS256: secret must be >= 32 bytes (UTF-8)
jwt.secret=0123456789abcdef0123456789abcdef
jwt.expiration-ms=3600000

# When true, login uses Spring Security HaveIBeenPwnedRestApiPasswordChecker (requires outbound HTTPS).
# Set false for offline work or to skip the check.
app.security.compromised-password-check=true

# PostgreSQL (create database first: CREATE DATABASE spring_auth;)
spring.datasource.url=jdbc:postgresql://localhost:5432/springauth
spring.datasource.username=postgres
spring.datasource.password=Dhana@123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Allow registration JSON "role":"ADMIN". Keep false in production.
app.registration.allow-admin-role=false
